{% extends "base.html" %}

{% block title %}Paste Dilindungi — Pastely{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="glass-card max-w-md w-full p-10 text-center">

    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-gray-700/50 to-gray-800/50 border border-white/10 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
    </div>

    <h1 class="text-xl font-semibold text-gray-100 mb-2">Paste Dilindungi</h1>
    <p class="text-sm text-gray-500 mb-8">
      Paste ini memerlukan password untuk dibuka.
      {% if paste.title %}<br><span class="text-gray-400 font-medium">{{ paste.title }}</span>{% endif %}
    </p>

    <form method="POST" class="text-left">
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password"
          class="form-input"
          placeholder="Masukkan password..."
          autofocus
          required
        />
      </div>
      <button type="submit" class="btn-primary w-full justify-center py-3">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
        </svg>
        Buka Paste
      </button>
    </form>

    <a href="{{ url_for('paste.index') }}" class="inline-block mt-4 text-sm text-gray-600 hover:text-gray-400 transition-colors">
      ← Kembali ke beranda
    </a>
  </div>
</div>
{% endblock %}
